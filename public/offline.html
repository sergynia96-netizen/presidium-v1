<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PRESIDIUM Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #13202e 0%, #070b10 65%, #040608 100%);
        color: #e5f8ef;
      }

      .card {
        width: min(92vw, 560px);
        border: 1px solid rgba(16, 185, 129, 0.35);
        background: rgba(5, 14, 20, 0.78);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #b7d8ca;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <h1>Offline mode</h1>
      <p>
        PRESIDIUM is currently offline. Reconnect to continue syncing chats and media.
      </p>
    </main>
  </body>
</html>
